{% extends "base.html" %}

{% block title %}Event Management{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-calendar-alt text-primary me-2"></i> Event Management</h2>
    <a href="{{ url_for('hub') }}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i> Back to Hub
    </a>
</div>

<div class="card shadow-sm border-0 mb-4">
    <div class="card-body py-5 text-center">
        <div class="display-1 text-muted opacity-25 mb-3">
            <i class="fas fa-tools"></i>
        </div>
        <h3 class="font-weight-bold">Event Management Under Construction</h3>
        <p class="text-muted">This module will allow you to organize, schedule, and track all your events.</p>
    </div>
</div>
{% endblock %}
