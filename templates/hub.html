<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub - RED STUDIO</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(239, 68, 68, 0.1), transparent 25%),
                radial-gradient(circle at 50% 80%, rgba(139, 92, 246, 0.15), transparent 25%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite ease-in-out alternate;
        }
        .orb-1 { width: 300px; height: 300px; background: rgba(59, 130, 246, 0.2); top: -10%; left: -10%; animation-delay: 0s; }
        .orb-2 { width: 400px; height: 400px; background: rgba(139, 92, 246, 0.15); bottom: -20%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.1); }
        }

        .hub-container {
            max-width: 1100px;
            width: 100%;
            padding: 3rem 2rem;
            text-align: center;
            z-index: 10;
        }

        .hub-header {
            margin-bottom: 4.5rem;
            animation: fadeInDown 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .welcome-badge {
            display: inline-block;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #93c5fd;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .hub-header h1 {
            font-weight: 800;
            font-size: 4rem;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -1.5px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hub-header p {
            color: var(--text-muted);
            font-size: 1.15rem;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
            font-weight: 300;
        }

        .cards-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s both;
        }

        .app-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 3rem 2rem;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .app-card:hover {
            transform: translateY(-12px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.05);
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            margin-bottom: 2rem;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 2;
        }

        .app-card:hover .icon-wrapper {
            transform: scale(1.15) rotate(5deg);
        }

        /* Specific card styles */
        .card-billing .icon-wrapper {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4), inset 0 2px 4px rgba(255,255,255,0.3);
        }
        .card-billing:hover { box-shadow: 0 20px 40px rgba(59, 130, 246, 0.15); }

        .card-ledger .icon-wrapper {
            background: linear-gradient(135deg, #10b981, #047857);
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.4), inset 0 2px 4px rgba(255,255,255,0.3);
        }
        .card-ledger:hover { box-shadow: 0 20px 40px rgba(16, 185, 129, 0.15); }

        .card-events .icon-wrapper {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.4), inset 0 2px 4px rgba(255,255,255,0.3);
        }
        .card-events:hover { box-shadow: 0 20px 40px rgba(139, 92, 246, 0.15); }

        .app-card h3 {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            z-index: 2;
            letter-spacing: -0.5px;
        }

        .app-card p {
            color: var(--text-muted);
            font-size: 1rem;
            margin: 0;
            font-weight: 400;
            line-height: 1.5;
            z-index: 2;
        }

        .logout-btn {
            position: absolute;
            top: 2rem;
            right: 2.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255,255,255,0.03);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            z-index: 100;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.3);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Animated Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <a href="{{ url_for('logout') }}" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>

    <div class="hub-container">
        <div class="hub-header">
            <div class="welcome-badge">
                <i class="fas fa-crown me-2"></i> Admin Portal
            </div>
            <h1>RED STUDIO</h1>
            <p>Welcome back, {{ session.get('username', 'Admin') }}. Select a module to continue.</p>
        </div>

        <div class="cards-wrapper">
            <!-- Billing Software -->
            <a href="{{ url_for('dashboard') }}" class="app-card card-billing">
                <div class="icon-wrapper">
                    <i class="fas fa-file-invoice-dollar"></i>
                </div>
                <h3>Billing Software</h3>
                <p>Manage invoices, customers, and inventory</p>
            </a>

            <!-- Ledger -->
            <a href="{{ url_for('ledger') }}" class="app-card card-ledger">
                <div class="icon-wrapper">
                    <i class="fas fa-book"></i>
                </div>
                <h3>Ledger</h3>
                <p>Track income, expenses, and accounts</p>
            </a>

            <!-- Event Management -->
            <a href="{{ url_for('events') }}" class="app-card card-events">
                <div class="icon-wrapper">
                    <i class="fas fa-calendar-alt"></i>
                </div>
                <h3>Event Management</h3>
                <p>Organize and schedule studio events</p>
            </a>
        </div>
    </div>

</body>
</html>
